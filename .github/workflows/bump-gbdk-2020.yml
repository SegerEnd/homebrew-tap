name: Bump gbdk-2020

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-gbdk-2020

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Update formula to latest upstream release
        id: bump
        run: |
          set -euo pipefail
          repo=gbdk-2020/gbdk-2020
          formula=Formula/gbdk-2020.rb

          latest=$(gh release view --repo "$repo" --json tagName --jq .tagName)
          current=$(sed -n 's/^[[:space:]]*version "\([^"]*\)".*/\1/p' "$formula" | head -n1)
          {
            echo "current=$current"
            echo "latest=$latest"
          } >> "$GITHUB_OUTPUT"

          sed -i -E "s|(version \")[^\"]+\"|\1${latest}\"|;s|(releases/download/)[^/]+/|\1${latest}/|g" "$formula"

          for asset in gbdk-macos.tar.gz gbdk-macos-arm64.tar.gz gbdk-linux64.tar.gz gbdk-linux-arm64.tar.gz; do
            sha=$(curl -fsSL "https://github.com/$repo/releases/download/$latest/$asset" | sha256sum | cut -d' ' -f1)
            sed -i -E "/${asset}\"$/{n;s|\"[0-9a-f]{64}\"|\"${sha}\"|;}" "$formula"
          done

      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BUMP_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "gbdk-2020: ${{ steps.bump.outputs.current }} -> ${{ steps.bump.outputs.latest }}"
          title: "gbdk-2020: ${{ steps.bump.outputs.current }} -> ${{ steps.bump.outputs.latest }}"
          body: |
            Automated upstream version bump from `${{ steps.bump.outputs.current }}` to `${{ steps.bump.outputs.latest }}`.
          branch: bump/gbdk-2020
          delete-branch: true
